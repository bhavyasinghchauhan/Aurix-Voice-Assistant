<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AURIX Sphere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: transparent;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* NO -webkit-app-region: drag — it eats click events */
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }

        #state-label {
            position: absolute;
            bottom: 12px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(150, 200, 255, 0.7);
            pointer-events: none;
            text-shadow: 0 0 8px rgba(100, 160, 255, 0.5);
            z-index: 20;
        }

        #click-hint {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 9px;
            letter-spacing: 1px;
            color: rgba(0, 255, 255, 0);
            pointer-events: none;
            transition: color 0.3s;
            z-index: 20;
        }

        #container:hover #click-hint {
            color: rgba(0, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="canvas-container"></div>
        <div id="click-overlay"></div>
        <div id="state-label">IDLE</div>
        <div id="click-hint">CLICK TO TOGGLE HUD</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const { ipcRenderer } = require('electron');

        // Three.js setup
        let scene, camera, renderer, sphere;
        let animationId;
        let originalPositions = null;

        // Audio values
        let audioLow = 0.15, audioMid = 0.15, audioHigh = 0.15, audioAmp = 0.15;
        let targetAudioLow = 0.15, targetAudioMid = 0.15, targetAudioHigh = 0.15, targetAudioAmp = 0.15;

        // Speaking animation
        let speakingIntensity = 0;
        let speakingTarget = 0;
        let speakingPhase = 0;

        // Goodbye animation
        let goodbyeActive = false;
        let goodbyeProgress = 0;

        const STATE_COLORS = {
            idle:      { r: 0.2, g: 0.4, b: 1.0,  label: 'IDLE',      labelColor: 'rgba(100,160,255,0.7)' },
            listening: { r: 0.1, g: 0.9, b: 0.4,  label: 'LISTENING', labelColor: 'rgba(50,230,120,0.8)' },
            thinking:  { r: 1.0, g: 0.6, b: 0.1,  label: 'THINKING',  labelColor: 'rgba(255,170,50,0.8)' },
            speaking:  { r: 0.9, g: 0.3, b: 0.6,  label: 'SPEAKING',  labelColor: 'rgba(230,100,160,0.8)' },
            error:     { r: 0.9, g: 0.1, b: 0.1,  label: 'ERROR',     labelColor: 'rgba(230,50,50,0.8)' },
            goodbye:   { r: 0.1, g: 0.2, b: 0.8,  label: 'GOODBYE',   labelColor: 'rgba(80,120,255,0.6)' },
        };

        let currentState = 'idle';
        let targetColor = { ...STATE_COLORS.idle };
        let liveColor = { r: 0.2, g: 0.4, b: 1.0 };

        // Click handler — dedicated overlay div ensures clicks aren't eaten by drag regions
        document.getElementById('click-overlay').addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            console.log('[AURIX] Sphere clicked — sending to main process');
            ipcRenderer.send('sphere-clicked');
        });

        ipcRenderer.on('aurix-state', (event, state) => {
            const s = STATE_COLORS[state] || STATE_COLORS.idle;
            currentState = state;
            targetColor = { ...s };

            if (state === 'speaking') {
                speakingTarget = 1.0;
            } else {
                speakingTarget = 0;
            }

            const label = document.getElementById('state-label');
            label.textContent = s.label;
            label.style.color = s.labelColor;
            label.style.textShadow = `0 0 8px ${s.labelColor}`;
        });

        ipcRenderer.on('aurix-audio', (event, data) => {
            if (data.low  !== undefined) targetAudioLow  = data.low;
            if (data.mid  !== undefined) targetAudioMid  = data.mid;
            if (data.high !== undefined) targetAudioHigh = data.high;
            if (data.amp  !== undefined) targetAudioAmp  = data.amp;
        });

        ipcRenderer.on('aurix-goodbye', () => {
            goodbyeActive = true;
            goodbyeProgress = 0;
            currentState = 'goodbye';
            targetColor = { ...STATE_COLORS.goodbye };

            const label = document.getElementById('state-label');
            label.textContent = 'GOODNIGHT';
            label.style.color = 'rgba(80,120,255,0.6)';
        });

        function initThree() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            const geometry = new THREE.IcosahedronGeometry(1, 4);
            originalPositions = geometry.getAttribute('position').array.slice();

            const material = new THREE.ShaderMaterial({
                uniforms: {
                    time:        { value: 0 },
                    audioLow:    { value: 0.15 },
                    audioMid:    { value: 0.15 },
                    audioHigh:   { value: 0.15 },
                    audioAmp:    { value: 0.15 },
                    stateR:      { value: 0.2 },
                    stateG:      { value: 0.4 },
                    stateB:      { value: 1.0 },
                    speakPulse:  { value: 0.0 },
                    goodbyeFade: { value: 1.0 },
                },
                vertexShader: `
                    uniform float time;
                    uniform float audioLow;
                    uniform float audioMid;
                    uniform float audioHigh;
                    uniform float speakPulse;

                    varying vec3 vNormal;
                    varying vec3 vPosition;

                    float hash(vec3 p) {
                        p = fract(p * 0.3183099 + 0.1);
                        p *= 17.0;
                        return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
                    }

                    float noise(vec3 x) {
                        vec3 p = floor(x);
                        vec3 f = fract(x);
                        f = f * f * (3.0 - 2.0 * f);
                        return mix(
                            mix(mix(hash(p), hash(p + vec3(1,0,0)), f.x),
                                mix(hash(p + vec3(0,1,0)), hash(p + vec3(1,1,0)), f.x), f.y),
                            mix(mix(hash(p + vec3(0,0,1)), hash(p + vec3(1,0,1)), f.x),
                                mix(hash(p + vec3(0,1,1)), hash(p + vec3(1,1,1)), f.x), f.y),
                            f.z);
                    }

                    void main() {
                        vNormal = normal;
                        vPosition = position;

                        vec3 pos = position;
                        float t = time * 0.3;

                        float n1 = noise(pos * 2.0 + t) * audioLow * 0.4;
                        float n2 = noise(pos * 4.0 - t * 1.5) * audioMid * 0.25;
                        float n3 = noise(pos * 8.0 + t * 2.0) * audioHigh * 0.15;

                        float speakWave = sin(pos.y * 4.0 + time * 3.0) * speakPulse * 0.15;
                        speakWave += sin(pos.x * 3.0 + time * 2.5) * speakPulse * 0.1;
                        speakWave += cos(pos.z * 5.0 + time * 4.0) * speakPulse * 0.08;

                        float displacement = n1 + n2 + n3 + speakWave;
                        pos += normal * displacement;

                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    uniform float audioLow;
                    uniform float audioMid;
                    uniform float audioHigh;
                    uniform float audioAmp;
                    uniform float stateR;
                    uniform float stateG;
                    uniform float stateB;
                    uniform float speakPulse;
                    uniform float goodbyeFade;

                    varying vec3 vNormal;
                    varying vec3 vPosition;

                    void main() {
                        vec3 normal = normalize(vNormal);
                        vec3 viewDir = normalize(cameraPosition - vPosition);

                        float fresnel = pow(1.0 - max(0.0, dot(viewDir, normal)), 2.0);

                        vec3 baseColor = vec3(stateR, stateG, stateB);

                        float shimmer = sin(vPosition.y * 8.0 + time * 5.0) * 0.5 + 0.5;
                        baseColor += vec3(shimmer * speakPulse * 0.15);

                        vec3 color = mix(baseColor, baseColor + vec3(0.3), fresnel);

                        color += vec3(audioAmp * 0.25);
                        color += vec3(fresnel * 0.4);
                        color += vec3(fresnel * speakPulse * 0.3);

                        float alpha = (0.7 + fresnel * 0.2) * goodbyeFade;

                        gl_FragColor = vec4(color, alpha);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide
            });

            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(1, 1, 1);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function idleBreath(t) {
            const base = 0.15;
            const breath = Math.sin(t * 0.4) * 0.06;
            targetAudioLow  = Math.max(targetAudioLow  * 0.97, base + breath);
            targetAudioMid  = Math.max(targetAudioMid  * 0.97, base + breath * 0.6);
            targetAudioHigh = Math.max(targetAudioHigh * 0.97, base + breath * 0.3);
            targetAudioAmp  = Math.max(targetAudioAmp  * 0.97, base + breath * 0.5);
        }

        function speakingBreath(t) {
            const wave1 = Math.sin(t * 2.3) * 0.3 + 0.4;
            const wave2 = Math.sin(t * 3.7) * 0.2 + 0.3;
            const wave3 = Math.sin(t * 5.1) * 0.15 + 0.2;
            const wave4 = Math.sin(t * 1.9) * 0.25 + 0.35;

            targetAudioLow  = Math.max(targetAudioLow,  wave1);
            targetAudioMid  = Math.max(targetAudioMid,  wave2);
            targetAudioHigh = Math.max(targetAudioHigh, wave3);
            targetAudioAmp  = Math.max(targetAudioAmp,  wave4);
        }

        function animate() {
            animationId = requestAnimationFrame(animate);

            const now = performance.now() / 1000;

            const cSmooth = 0.08;
            liveColor.r += (targetColor.r - liveColor.r) * cSmooth;
            liveColor.g += (targetColor.g - liveColor.g) * cSmooth;
            liveColor.b += (targetColor.b - liveColor.b) * cSmooth;

            speakingIntensity += (speakingTarget - speakingIntensity) * 0.06;
            if (currentState === 'speaking') {
                speakingPhase += 0.016;
                speakingBreath(now);
            }

            const aSmooth = 0.25;
            audioLow  += (targetAudioLow  - audioLow)  * aSmooth;
            audioMid  += (targetAudioMid  - audioMid)  * aSmooth;
            audioHigh += (targetAudioHigh - audioHigh) * aSmooth;
            audioAmp  += (targetAudioAmp  - audioAmp)  * aSmooth;

            if (currentState !== 'speaking') {
                idleBreath(now);
            }

            if (goodbyeActive) {
                goodbyeProgress = Math.min(goodbyeProgress + 0.005, 1.0);
            }

            if (sphere) {
                const u = sphere.material.uniforms;
                u.time.value += 0.016;
                u.audioLow.value  = audioLow;
                u.audioMid.value  = audioMid;
                u.audioHigh.value = audioHigh;
                u.audioAmp.value  = audioAmp;
                u.stateR.value    = liveColor.r;
                u.stateG.value    = liveColor.g;
                u.stateB.value    = liveColor.b;
                u.speakPulse.value = speakingIntensity;
                u.goodbyeFade.value = goodbyeActive ? 1.0 - goodbyeProgress : 1.0;

                let rotSpeed = 0.002;
                if (currentState === 'thinking')  rotSpeed = 0.008;
                if (currentState === 'listening') rotSpeed = 0.004;
                if (currentState === 'speaking')  rotSpeed = 0.005 + speakingIntensity * 0.003;

                if (currentState === 'speaking') {
                    sphere.rotation.x = Math.sin(now * 1.5) * 0.05 * speakingIntensity;
                    sphere.rotation.z = Math.cos(now * 1.2) * 0.03 * speakingIntensity;
                } else {
                    sphere.rotation.x *= 0.95;
                    sphere.rotation.z *= 0.95;
                }

                if (goodbyeActive) {
                    const scale = 1.0 - goodbyeProgress * 0.6;
                    sphere.scale.setScalar(scale);
                }

                sphere.rotation.y += rotSpeed;
            }

            renderer.render(scene, camera);
        }

        initThree();
        animate();
    </script>
</body>
</html>
